;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
; This is the configuration file required by XookSuut3D.
;
; Some variables are deactivated by default.
; To activate a variable remove the starting semicolon and proceed to edit it.
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;


;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
; Cube header information
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

[header]
; XS3D expects as input a datacube consisting of two spatial axes, and one
; spectral axis (Z-axis).
; XS3D will read from the datacube the following keywords:
; CD1_1 & CD2_2 or CDELT1 & CDELT2 -> Spatial information
; CD3_3 or CDELT3, and CRVAL3 -> Spectral information

; XS3D will try to infer the spectral type based on the header information,
; i.e., from ctype3 or cunit3.
; If ctype3 information is not found then you MUST specify it here. Otherwise
; the code does not know how to covert the spectral axis to velocity, measured
; in km/s.
; ctype3 can be `lambda` , `freq`.
; In case the spectral type is velocity, you must choose between `velocity_ms` (i.e., m/s)
; or `velocity_kms` (i.e., km/s). (dtype str)
;ctype3=false

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
; Some general configurations prior the fitting
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

[general]
; Specify the number of cores to use. (dtype int)
;nthreads=2

; If you analyze multiple objects from the same dataset (i.e., ALMA, MUSE,
;etc)  you can specify it here.   (dtype str)
;dataset = -

; Where the models will be stored.
;output_directory = ./

; Rest frame of spectral line in same units as the cube spectral axis, i.e., Angstrom,
; Hz, mu, etc.
eline = 6562.68

; If the point spread function (PSF) information is not recorded in the cube header,
; then you can pass them here. HERE, `psf_fwhm` units must be in arcseconds and represents
; the spatial resolution at FWHM.
;psf_fwhm = 2.5

; Beam position angle (dtype deg).
;bpa=0

; Major and minor axes of the beam in arcseconds (dtype float). If `psf_fwhm` is not None,
; then bmaj=bmin=psf_fwhm. Otherwise you can input your values; in such a case
; `psf_fwhm` is ignored.
;bmaj=psf_fwhm
;bmin=psf_fwhm

; Instrumental resolution/broadening (at FWHM) in same units as the cube spectral axis,
; i.e., Angstrom, Hz, mu, etc., (dtype float).
fwhm_inst=6
; Optionally, you can pass the resolution/broadening (at FWHM) in km/s. (dtype float).
; If this is the case, the entrance `fwhm_inst` will be ignored.
;fwhm_kms=None

; Whether the velocity dispersion is fitted (dtype int). Options are 0: fix dispersion to
; the instrumental one; 1: vary, but constant across all rings; 2: vary in each ring.
fit_disp=1

; Cut channels from the cube along spectral axis, from wmin to wmax. Where wmin,wmax
; have same units as the cube spectral axis, i.e., Angstrom, Hz, mu, etc. (dtype float).
;wmin=None
;wmax=None

; If your data has not been removed from continuum emission, you can try to remove it
; (dtype boolean).
;baseline=false

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
; High redshift objects
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
; At high redshifts, it is common to place the zero point of the velocity frame
; into the source by redshifting the rest wavelength/frequency of the line
; (dtype float).
[high_z]
;redshift=0

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
; Bootstrap analysis configuration
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

[bootstrap]
; Errors are estimated via bootstrap. This operation is however time consuming
; and cannot be performed in parallel. (dtype int).
;Nboots = 0

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
; Configuration of constant parameters
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

[fitting]
; Whether noncircular motions are fitted (dtype int).
; Options:
;   1: Fit noncircular motions while keeping them constant across all rings.
;   2: Fit noncircular motions independently in each ring.
vary_nc=2

; Whether the bar position angle is varied in the bisymmetric model (dtype int).
; Options:
;   1: Fit a single bar position angle and keep it constant across all rings.
;   2: Fit the bar position angle independently in each ring.
vary_phibar=1

; Vertical weighting (dtype bool).
; If `zweight` is True, the axis perpendicular to the disk plane is weighted
; using a Gaussian function of the form exp(-z^2 / (2 * `z_scale`^2)).
; This option may be important for edge-on galaxies.
;zweight=False

; Radial weighting (dtype int).
; The weighting function is given by:
;   |cos(theta)|^(`rweight`)
rweight=1

; Choose the optimization method: Nelder Mead (`nelder`), or levenberg-Marquardt (`leastsq`).
optimethod=nelder

; Number of iterations (dtype int). Deprecated argument.
; Specifies the number of times the fitting procedure is repeated, using the
; best-fit parameters from the previous iteration as the initial guess for the next.
;n_it=0

[others]
; How velocity is defined along the spectral axis.
; For wavelength-type spectral axis, it is adopted the optical definition of velocity:
; 		v_opt = speed_light * (lambda_observed - lambda_rest) / lambda_rest (DEFAULT `opt`)
; For frequency-type it is adopted the radio definition of velocity:
;		v_rad = speed_light * (frec_rest - freq_obs) / freq_rest            (DEFAULT `rad`)
; Alternatively, the optical definition for frequency-type spectral axis is defined as:
;		v_opt = speed_light * (frec_rest - freq_obs) / freq_obs
; Following, set vdoppler to `opt` or `rad`. The default value depend on the spectral type (ctype3),
; as mentioned before. (dtype str)
;vdoppler = None

; How velocity is obtained from the datacube. The default is through 1st moment map.
; Optionally, velocities can be computed from the peak of the emission line, by fitting a second order
; polynomial (parabola) to the peak and the two adjacent points. (dtype boolean)
; vpeak = false

; In extragalactic objects the distance is computed from the Luminosity distance associated to the
; redshift (z=vsys/speed_light). For objects in our Galaxy, the distance must be passed for
; computing the scale bar. Units: distance (pc) (dtype float).
; distance = 0

; The following variables control the rms computation and the 3D mask that will be applied to the data cube.
; ´dv´ and ´ds´ control the shape of the 3D Gaussian kernel that will be used for estimating the RMS
; on a smoothed version of the original cube.
; dv (type int) and ds (type int) are the multiples by which the spectral and spatial resolution are
; degraded, respectively.
;dv=2
;ds=4

; Clip the cube by n-times the cube rms error.  (dtype float). A clipping level
; of 6 is most of the times an excellent choice; however it depends on the sensitivity of the data.
;clip=6

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
; Cloud configuration
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

[clouds]
; Disk vertical hight scale in arcseconds (dtype float)
z_scale = 0.1

; Distribution function of particles along the disk perpendicular axis. (dtype str)
; choose between `gaussian`, `sech2`, `exponential`, `uniform`
z_profile = sech2

; Average density of clouds per pixel on the disk plane (dtype int).
; A large number of clouds will populate the disk better, but will increase the cloud deposition into
; the sky plane.
nclouds = 3

; The number of times a cloud will be replicated for sampling the line width (dtype int). Ideally it
; should be the number of velocity channels. Each subcloud will share the same position as its parent,
; but different velocity dispersion.
nsubclouds =10

; Whether the circular velocity is a function of z, i.e., lagging. (dtype bool)
lagging = false
